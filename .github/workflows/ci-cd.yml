name: CI/CD Pipeline for Healthcare Microservices

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Step 1: Build (CI)
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [patient-service/src, application-service/src, order-service]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ✅ Login only on push (not needed for PR)
      - name: Login to DockerHub
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # ✅ Build always
      - name: Build Docker Image
        run: |
          docker build -t ${{ matrix.service }}:${{ github.sha }} ./${{ matrix.service }}

      # ✅ Push only on push (skip for PR)
      - name: Push Docker Image
        if: github.event_name == 'push'
        run: |
          docker tag ${{ matrix.service }}:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.sha }}

  # Step 2: Deploy (CD)
  deploy:
    needs: build
    runs-on: ubuntu-latest

    # ✅ Only deploy on push
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Example: Deploy using Docker Compose (or SSH / Kubernetes / etc.)
      - name: Deploy services
        run: |
          echo "Deploying services..."

          for service in patient-service application-service order-service
          do
            echo "Deploying $service..."

            docker pull ${{ secrets.DOCKER_USERNAME }}/$service:${{ github.sha }}

            # Example run (replace with your real deployment)
            docker stop $service || true
            docker rm $service || true

            docker run -d \
              --name $service \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/$service:${{ github.sha }}
          done
